version: "3"

services:
  frontend:
    build: ./frontend

  backend:
    build: ./backend
    depends_on:
      - postgres
      - redis
      - rabbitmq
    
  worker: 
    build: ./worker
    depends_on:
      - rabbitmq
      - postgres
  
  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER= admin
      - POSTGRES_PASSWORD= admin
      - POSTGRES_DB= appdb
    volumes: 
       - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
  
  rabbitmq:
    image: rabbitmq:3-management
    ports: 
      - "15672:15672"

  nginx:
    image: nginx
    ports: 
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
