<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products</title>
    <style>
      :root {
        --bg: #f5f9ff;
        --text: #1f2a44;
        --primary: #2a7fff;
        --primary-hover: #1566de;
        --card: #ffffff;
        --card-border: #d9e6ff;
      }

      body {
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 28px;
      }

      h1 {
        margin-top: 0;
        color: #173a75;
      }

      button {
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 10px 14px;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-hover);
      }

      #list {
        list-style: none;
        padding: 0;
        margin-top: 18px;
        max-width: 520px;
      }

      #list li {
        background: var(--card);
        border: 1px solid var(--card-border);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #list li button {
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <h1>Products</h1>
    <button onclick="load()">Load Products</button>
    <ul id="list"></ul>

    <script>
      async function buy(id) {
        await fetch("/api/order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ product_id: id }),
        });

        alert("Order Placed");
      }

      async function load() {
        const res = await fetch("/api/products");
        const data = await res.json();

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach((e) => {
          const li = document.createElement("li");
          li.innerHTML = `<span>${e.name} - Rs. ${e.price}</span>
          <button onclick="buy(${e.id})">Buy</button>`;
          list.appendChild(li);
        });
      }
    </script>
  </body>
</html>
